<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抽奖链接管理后台</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 登录框 */
        .login-box {
            max-width: 420px;
            margin: 100px auto;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 8px; color: #f0f6fc; }
        .login-box p { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 16px;
            outline: none;
        }
        .login-box input:focus { border-color: #58a6ff; }
        .login-box button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-box button:hover { background: #2ea043; }
        .login-box .error {
            color: #f85149;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .login-box .error.show { display: block; }

        /* 主界面 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 25px;
        }
        .header h1 { font-size: 24px; color: #f0f6fc; }
        .header .logout-btn {
            padding: 8px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            cursor: pointer;
        }
        .header .logout-btn:hover {
            border-color: #f85149;
            color: #f85149;
        }

        .hidden { display: none; }

        /* 创建链接表单 */
        .create-form {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 30px;
        }
        .create-form h3 { color: #f0f6fc; margin-bottom: 15px; }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: end;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: #58a6ff; }
        .btn-create {
            padding: 10px 30px;
            background: #1f6feb;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            min-width: 120px;
        }
        .btn-create:hover { background: #388bfd; }
        .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 生成的链接展示 */
        .link-result {
            background: #0d1117;
            border: 1px solid #238636;
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 15px;
            display: none;
        }
        .link-result.show { display: block; }
        .link-result .label { color: #8b949e; font-size: 13px; }
        .link-result .url {
            color: #58a6ff;
            font-size: 18px;
            word-break: break-all;
            margin: 5px 0 10px;
        }
        .link-result .copy-btn {
            padding: 6px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 13px;
        }
        .link-result .copy-btn:hover { background: #30363d; }

        /* 链接列表 */
        .links-list {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }
        .links-list .list-header {
            display: grid;
            grid-template-columns: 150px 1fr 80px 80px 100px;
            padding: 12px 16px;
            background: #0d1117;
            color: #8b949e;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 1px solid #30363d;
        }
        .link-item {
            display: grid;
            grid-template-columns: 150px 1fr 80px 80px 100px;
            padding: 12px 16px;
            border-bottom: 1px solid #21262d;
            align-items: center;
            font-size: 14px;
        }
        .link-item:hover { background: #1c2128; }
        .link-item .code {
            color: #58a6ff;
            font-family: monospace;
            font-size: 16px;
        }
        .link-item .name { color: #f0f6fc; }
        .link-item .visits { color: #f0883e; font-weight: 600; }
        .link-item .status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .link-item .status.active { background: #1a3a2a; color: #3fb950; }
        .link-item .status.inactive { background: #3a1a1a; color: #f85149; }
        .link-item .stats-btn {
            padding: 4px 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 12px;
        }
        .link-item .stats-btn:hover { background: #30363d; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #484f58;
        }

        /* 统计弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            max-width: 800px;
            width: 95%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { color: #f0f6fc; margin-bottom: 15px; }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
        }
        .modal .close-btn:hover { color: #f0f6fc; }
        .modal table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .modal th {
            text-align: left;
            padding: 8px 10px;
            background: #0d1117;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }
        .modal td {
            padding: 8px 10px;
            border-bottom: 1px solid #21262d;
        }
        .modal .ip { color: #58a6ff; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录 -->
        <div id="loginPanel" class="login-box">
            <h2>🔐 管理后台</h2>
            <p>请输入访问密钥</p>
            <input type="password" id="keyInput" placeholder="请输入密钥..." />
            <button id="loginBtn">验证身份</button>
            <div class="error" id="loginError">❌ 密钥错误，请重试</div>
        </div>

        <!-- 主界面 -->
        <div id="mainPanel" class="hidden">
            <div class="header">
                <h1>🎯 抽奖链接管理</h1>
                <div>
                    <span style="color:#8b949e;margin-right:15px;" id="userDisplay">管理员</span>
                    <button class="logout-btn" id="logoutBtn">退出</button>
                </div>
            </div>

            <!-- 创建链接 -->
            <div class="create-form">
                <h3>📝 创建追踪链接</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>活动名称</label>
                        <input type="text" id="activityName" placeholder="如：618抽奖活动" value="QQ群抽奖活动" />
                    </div>
                    <div class="form-group">
                        <label>跳转目标 URL</label>
                        <input type="url" id="targetUrl" placeholder="https://cjblts.zft1145.top/index.html" value="https://cjblts.zft1145.top/index.html" />
                    </div>
                    <button class="btn-create" id="createBtn">🚀 生成链接</button>
                </div>
                <div class="link-result" id="linkResult">
                    <div class="label">✅ 链接已生成：</div>
                    <div class="url" id="generatedUrl"></div>
                    <button class="copy-btn" id="copyBtn">📋 复制链接</button>
                    <button class="copy-btn" style="margin-left:10px;" id="viewStatsBtn">📊 查看统计</button>
                </div>
            </div>

            <!-- 链接列表 -->
            <div class="links-list">
                <div class="list-header">
                    <span>短码</span>
                    <span>活动名称</span>
                    <span>访问量</span>
                    <span>状态</span>
                    <span>操作</span>
                </div>
                <div id="linksContainer">
                    <div class="empty-state">暂无链接，创建第一个吧！</div>
                </div>
            </div>
        </div>

        <!-- 统计弹窗 -->
        <div class="modal-overlay" id="statsModal">
            <div class="modal">
                <button class="close-btn" id="modalClose">&times;</button>
                <h3 id="modalTitle">📊 访问统计</h3>
                <div style="color:#8b949e;font-size:14px;margin-bottom:15px;">
                    总访问量：<span id="modalTotal" style="color:#f0883e;font-weight:600;">0</span>
                </div>
                <div id="modalBody">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>IP</th>
                                <th>设备</th>
                                <th>系统版本</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const WORKER_URL = 'https://fxyzapi.zft1145.top';
            let adminKey = '';

            // DOM
            const loginPanel = document.getElementById('loginPanel');
            const mainPanel = document.getElementById('mainPanel');
            const keyInput = document.getElementById('keyInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const logoutBtn = document.getElementById('logoutBtn');
            const createBtn = document.getElementById('createBtn');
            const activityName = document.getElementById('activityName');
            const targetUrl = document.getElementById('targetUrl');
            const linkResult = document.getElementById('linkResult');
            const generatedUrl = document.getElementById('generatedUrl');
            const copyBtn = document.getElementById('copyBtn');
            const viewStatsBtn = document.getElementById('viewStatsBtn');
            const linksContainer = document.getElementById('linksContainer');
            const statsModal = document.getElementById('statsModal');
            const modalClose = document.getElementById('modalClose');
            const modalTitle = document.getElementById('modalTitle');
            const modalTotal = document.getElementById('modalTotal');
            const modalTableBody = document.getElementById('modalTableBody');

            // ---------- 登录 ----------
            async function doLogin() {
                const key = keyInput.value.trim();
                if (!key) {
                    loginError.textContent = '⚠️ 请输入密钥';
                    loginError.classList.add('show');
                    return;
                }

                loginError.classList.remove('show');

                try {
                    const res = await fetch(WORKER_URL + '/admin/links?key=' + encodeURIComponent(key));
                    if (res.status === 401) {
                        loginError.textContent = '❌ 密钥错误，请重试';
                        loginError.classList.add('show');
                        keyInput.value = '';
                        return;
                    }
                    
                    if (res.ok) {
                        adminKey = key;
                        localStorage.setItem('admin_key', key);
                        loginPanel.style.display = 'none';
                        mainPanel.classList.remove('hidden');
                        loadLinks();
                    } else {
                        loginError.textContent = '❌ 登录失败，请重试';
                        loginError.classList.add('show');
                    }
                } catch (err) {
                    loginError.textContent = '⚠️ 网络错误';
                    loginError.classList.add('show');
                }
            }

            // ---------- 加载链接列表 ----------
            async function loadLinks() {
                try {
                    const res = await fetch(WORKER_URL + '/admin/links?key=' + encodeURIComponent(adminKey));
                    if (!res.ok) throw new Error('加载失败');
                    const data = await res.json();
                    renderLinks(data.links || []);
                } catch (err) {
                    console.error(err);
                    linksContainer.innerHTML = '<div class="empty-state">⚠️ 加载失败</div>';
                }
            }

            // ---------- 渲染链接列表 ----------
            function renderLinks(links) {
                if (!links || links.length === 0) {
                    linksContainer.innerHTML = '<div class="empty-state">📭 暂无链接，创建第一个吧！</div>';
                    return;
                }

                let html = '';
                links.forEach(link => {
                    const statusClass = link.enabled !== false ? 'active' : 'inactive';
                    const statusText = link.enabled !== false ? '✅ 启用' : '⛔ 禁用';
                    html += `
                        <div class="link-item">
                            <span class="code">/${link.shortCode}</span>
                            <span class="name">${link.activityName || '未命名'}</span>
                            <span class="visits">${link.visits || 0}</span>
                            <span class="status ${statusClass}">${statusText}</span>
                            <div>
                                <button class="stats-btn" data-code="${link.shortCode}">📊 统计</button>
                            </div>
                        </div>
                    `;
                });
                linksContainer.innerHTML = html;

                // 绑定统计按钮
                document.querySelectorAll('.stats-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const code = this.dataset.code;
                        showStats(code);
                    });
                });
            }

            // ---------- 创建链接 ----------
            async function createLink() {
                const name = activityName.value.trim() || '未命名活动';
                const target = targetUrl.value.trim() || 'https://cjblts.zft1145.top/index.html';

                createBtn.disabled = true;
                createBtn.textContent = '⏳ 生成中...';

                try {
                    const res = await fetch(WORKER_URL + '/admin/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            key: adminKey,
                            activityName: name,
                            targetUrl: target,
                            creator: 'admin'
                        })
                    });

                    const data = await res.json();
                    if (data.success) {
                        const fullUrl = data.url;
                        generatedUrl.textContent = fullUrl;
                        linkResult.classList.add('show');
                        // 保存当前短码用于查看统计
                        linkResult.dataset.code = data.shortCode;
                        // 刷新列表
                        loadLinks();
                    } else {
                        alert('创建失败：' + (data.error || '未知错误'));
                    }
                } catch (err) {
                    alert('创建失败：' + err.message);
                }

                createBtn.disabled = false;
                createBtn.textContent = '🚀 生成链接';
            }

            // ---------- 查看统计 ----------
            async function showStats(shortCode) {
                try {
                    const res = await fetch(WORKER_URL + '/admin/stats/' + shortCode + '?key=' + encodeURIComponent(adminKey));
                    if (!res.ok) throw new Error('加载失败');
                    const data = await res.json();

                    modalTitle.textContent = '📊 ' + (data.link.activityName || '未命名') + ' - 访问统计';
                    modalTotal.textContent = data.totalVisits;

                    let html = '';
                    (data.visits || []).forEach(v => {
                        const time = v.timestamp ? new Date(v.timestamp).toLocaleString('zh-CN') : '-';
                        const device = v.deviceType || v.os || '未知';
                        const osVer = v.osVersion || '-';
                        html += `
                            <tr>
                                <td>${time}</td>
                                <td class="ip">${v.ip || '-'}</td>
                                <td>${device}</td>
                                <td>${osVer}</td>
                            </tr>
                        `;
                    });

                    if (!html) {
                        html = '<tr><td colspan="4" style="text-align:center;color:#484f58;padding:20px;">暂无访问记录</td></tr>';
                    }

                    modalTableBody.innerHTML = html;
                    statsModal.classList.add('show');
                } catch (err) {
                    alert('加载统计失败：' + err.message);
                }
            }

            // ---------- 复制链接 ----------
            function copyLink() {
                const url = generatedUrl.textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => {
                        copyBtn.textContent = '✅ 已复制';
                        setTimeout(() => { copyBtn.textContent = '📋 复制链接'; }, 2000);
                    });
                } else {
                    // fallback
                    const input = document.createElement('input');
                    input.value = url;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    copyBtn.textContent = '✅ 已复制';
                    setTimeout(() => { copyBtn.textContent = '📋 复制链接'; }, 2000);
                }
            }

            // ---------- 退出 ----------
            function logout() {
                localStorage.removeItem('admin_key');
                adminKey = '';
                loginPanel.style.display = 'block';
                mainPanel.classList.add('hidden');
                keyInput.value = '';
                loginError.classList.remove('show');
            }

            // ---------- 事件绑定 ----------
            loginBtn.addEventListener('click', doLogin);
            keyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
            logoutBtn.addEventListener('click', logout);
            createBtn.addEventListener('click', createLink);
            copyBtn.addEventListener('click', copyLink);
            modalClose.addEventListener('click', () => statsModal.classList.remove('show'));
            statsModal.addEventListener('click', (e) => {
                if (e.target === statsModal) statsModal.classList.remove('show');
            });

            // 查看统计（从生成结果）
            viewStatsBtn.addEventListener('click', function() {
                const code = linkResult.dataset.code;
                if (code) showStats(code);
            });

            // ---------- 检查登录状态 ----------
            const savedKey = localStorage.getItem('admin_key');
            if (savedKey) {
                adminKey = savedKey;
                loginPanel.style.display = 'none';
                mainPanel.classList.remove('hidden');
                loadLinks();
            }
        })();
    </script>
</body>
</html>
